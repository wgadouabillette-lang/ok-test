<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="Assets/favicon.svg" type="image/svg+xml">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      margin: 0; padding: 0; height: 100%; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background-color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #000; overflow: hidden; position: relative;
    }
    :root { --offset-x: 0px; --offset-y: 42px; }
    .back-btn {
      position: fixed; top: 20px; left: 20px; background: none; border: none; cursor: pointer; padding: 8px; z-index: 1000;
    }
    .back-btn svg { width: 24px; height: 24px; stroke: #888; }
    .auth-container {
      width: 345px; max-width: 92vw; text-align: center;
      padding: 24px 20px 180px 20px;
      transform: translate(var(--offset-x), var(--offset-y));
    }
    .logo-placeholder {
      width: 40px; height: 40px; margin: 0 auto 32px auto;
      display: flex; align-items: center; justify-content: center;
      background: #f0f0f0; border-radius: 10px;
    }
    .logo-placeholder img { width: 28px; height: 28px; object-fit: contain; }
    .title { font-size: 32px; line-height: 36px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    .subtitle { color: #666666; font-size: 15px; line-height: 20px; margin: 0 0 32px 0; }
    .social-buttons { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .btn-provider, .btn-continue {
      border-radius: 10px; font-size: 16px; font-weight: 500;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      cursor: pointer; transition: all 0.18s ease; width: 100%;
      border: 1px solid #d0d0d0; background: #ffffff; color: #000000;
    }
    .btn-provider { height: 40px; }
    .btn-continue { height: 44px; }
    .btn-provider:hover, .btn-continue:hover { background: #f8f8f8; border-color: #b0b0b0; }
    .btn-provider img { width: 22px; height: 22px; object-fit: contain; }
    .btn-provider.disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-provider-loading {
      position: relative;
      pointer-events: none;
      color: transparent !important;
    }
    .btn-provider-loading img {
      opacity: 0;
    }
    .btn-provider-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .btn-provider-loader-circle {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.12);
      border-top-color: #000;
      animation: btn-spin 0.6s linear infinite;
    }
    @keyframes btn-spin {
      to { transform: rotate(360deg); }
    }
    .or-separator { display: flex; align-items: center; margin: 8px 0; color: #888888; font-size: 14px; font-weight: 400; }
    .or-separator::before, .or-separator::after { content: ''; flex: 1; height: 1px; background: #dddddd; }
    .or-separator span { padding: 0 16px; }
    .email-input {
      width: 100%; height: 44px; padding: 0 16px; font-size: 16px; color: #222222;
      background: #ffffff; border: 1px solid #dddddd; border-radius: 12px; margin-bottom: 6px;
      transition: all 0.18s ease;
    }
    .email-input:focus {
      outline: none; border-color: #000000; box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }
    .email-input::placeholder { color: #999999; }
    .btn-continue { background-color: #000000; color: #ffffff; border: none; font-weight: 600; }
    .btn-continue:hover { background-color: #222222; }
    .legal-footer {
      position: fixed; bottom: 0; left: 0; right: 0; text-align: center;
      padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
      font-size: 13px; line-height: 18px; color: #666666;
      background: linear-gradient(to top, #ffffff, rgba(255,255,255,0.96));
      z-index: 10;
    }
    .legal-footer a { color: #000000; text-decoration: underline; }
    .form-footer { margin-top: 16px; font-size: 14px; color: #666; }
    .form-footer a { color: #000; text-decoration: underline; }
    @supports (-webkit-touch-callout: none) { body { min-height: -webkit-fill-available; } }
    @media (max-height: 640px) {
      .title { font-size: 28px; line-height: 32px; }
      .subtitle { margin-bottom: 24px; }
      .auth-container { padding: 20px 20px 160px 20px; }
      .logo-placeholder { margin-bottom: 24px; }
      .or-separator { margin: 12px 0; }
    }
    @media (max-width: 380px) {
      .title { font-size: 26px; line-height: 30px; }
      .auth-container { padding: 20px 16px 160px 16px; }
      .back-btn { left: 12px; top: 12px; }
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="location.href='index.html'" aria-label="Back to home">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <div class="auth-container">

    <div class="logo-placeholder">
      <img src="Assets/favicon.svg" alt="XYZ">
    </div>

    <div class="title">Dealer portal</div>
    <p class="subtitle">Sign in to your dealer account</p>

    <div class="social-buttons">
      <button id="google-login" class="btn-provider">
        <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google">
        Continue with Google
      </button>
      <button id="apple-login" class="btn-provider">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
        Continue with Apple
      </button>
      <button id="microsoft-login" class="btn-provider">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft">
        Continue with Microsoft
      </button>
    </div>

    <div class="or-separator"><span>or</span></div>

    <input type="email" id="email-input" class="email-input" placeholder="Email address" autocomplete="email">
    <button id="continue-btn" class="btn-continue">Continue</button>

  </div>

  <div class="legal-footer">
    By continuing, you accept the<br>
    <a href="pages/terms-of-service.html">Terms of Service</a> and
    <a href="pages/privacy-policy.html">Privacy Policy</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB-GXhoDX-3JZumQnk3d8_tMSuv86SsI3E",
      authDomain: "phil-b1d11.firebaseapp.com",
      projectId: "phil-b1d11",
      storageBucket: "phil-b1d11.firebasestorage.app",
      messagingSenderId: "327318454594",
      appId: "1:327318454594:web:c962576120f628025548db",
      measurementId: "G-64PHKR6LE4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const googleBtn = document.getElementById('google-login');
    const appleBtn = document.getElementById('apple-login');
    const microsoftBtn = document.getElementById('microsoft-login');

    function withProviderLoading(btn, action) {
      if (!btn) return action();
      if (btn.classList.contains('btn-provider-loading')) return;
      btn.classList.add('btn-provider-loading');
      const loader = document.createElement('div');
      loader.className = 'btn-provider-loader';
      loader.innerHTML = '<div class="btn-provider-loader-circle"></div>';
      btn.appendChild(loader);
      btn.disabled = true;
      setTimeout(async () => {
        try {
          await action();
        } finally {
          loader.remove();
          btn.classList.remove('btn-provider-loading');
          btn.disabled = false;
        }
      }, 650);
    }

    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.replace('app.html');
      }
    });

    googleBtn?.addEventListener('click', () => {
      withProviderLoading(googleBtn, async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await auth.signInWithPopup(provider);
          window.location.replace('app.html');
        } catch (err) {
          alert(err?.message || 'Sign-in failed. Please try again.');
        }
      });
    });

    appleBtn?.addEventListener('click', () => {
      withProviderLoading(appleBtn, async () => {
        alert('Apple Sign-In not configured yet.');
      });
    });

    microsoftBtn?.addEventListener('click', () => {
      withProviderLoading(microsoftBtn, async () => {
        alert('Microsoft Sign-In not configured yet.');
      });
    });

    document.getElementById('continue-btn')?.addEventListener('click', () => {
      const email = document.getElementById('email-input')?.value?.trim();
      if (!email || !email.includes('@')) {
        alert("Please enter a valid email address.");
        return;
      }
      alert("Sign-in link sent to " + email + " (simulation). Use Google, Apple or Microsoft to sign in.");
    });
  </script>
</body>
</html>
